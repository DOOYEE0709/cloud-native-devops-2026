# kube-prometheus-stack의 Prometheus는 prometheus.io/scrape 어노테이션을 무시하고
# PodMonitor/ServiceMonitor로만 수집한다. Istio 사이드카/istiod 메트릭을 긁으려면
# 아래 두 리소스를 추가해야 Kiali graph가 그려진다.
#   kubectl apply -f podmonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-stats-monitor
  namespace: monitoring
  labels:
    monitoring: istio-proxies
spec:
  selector:
    matchExpressions:
      - key: istio-prometheus-ignore
        operator: DoesNotExist
  namespaceSelector:
    any: true
  jobLabel: envoy-stats
  podMetricsEndpoints:
    - path: /stats/prometheus
      interval: 15s
      relabelings:
        # istio-proxy 컨테이너만
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_container_name]
          regex: "istio-proxy"
        # prometheus.io/scrape=true 인 pod만
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          regex: "true"
        # scrape 주소를 사이드카 메트릭 포트(prometheus.io/port=15020)로 교체
        - action: replace
          sourceLabels:
            - __address__
            - __meta_kubernetes_pod_annotation_prometheus_io_port
          regex: (\d+\.\d+\.\d+\.\d+):\d+;(\d+)
          replacement: $1:$2
          targetLabel: __address__
        - action: labeldrop
          regex: "__meta_kubernetes_pod_label_(.+)"
        - action: replace
          sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istiod-monitor
  namespace: monitoring
  labels:
    monitoring: istio-control-plane
spec:
  selector:
    matchLabels:
      istio: pilot
  namespaceSelector:
    matchNames: [istio-system]
  endpoints:
    - port: http-monitoring
      interval: 15s
