apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-api-bad-readiness
  namespace: week4
  labels:
    app: runtime-api-bad-readiness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime-api-bad-readiness
  template:
    metadata:
      labels:
        app: runtime-api-bad-readiness
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0
          args:
            - "-listen=:8080"
            - "-text=running but not ready"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            # http-echo는 8080만 listen → 8081로 보내면 연결 자체가 거부됨
            # (http-echo:1.0은 모든 경로에 200을 주므로 path로는 실패를 못 만듦)
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

